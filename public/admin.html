<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin — Certificados SMED</title>
  <link rel="icon" type="image/png" href="/certificador.png">
  <link rel="apple-touch-icon" href="/certificador.png">
  <meta property="og:image" content="/certificador.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #0D1F3C;
      --green:  #2E6B4F;
      --gold:   #B8973A;
      --red:    #c0392b;
      --cream:  #FAF8F3;
      --border: #DDD8CC;
      --text:   #2A2A2A;
      --muted:  #6B6B6B;
      --radius: 10px;
    }
    body { font-family: 'Jost', sans-serif; background: var(--cream); min-height: 100vh; padding: 32px 16px; }

    /* LOGIN */
    .login-wrap {
      max-width: 380px; margin: 80px auto;
      background: #fff; border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(13,31,60,.12); padding: 40px;
    }
    .login-wrap h1 { font-size: 1.3rem; color: var(--navy); margin-bottom: 8px; }
    .login-wrap p  { font-size: .82rem; color: var(--muted); margin-bottom: 24px; }
    .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .input-group label { font-size: .72rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .input-group input {
      padding: 11px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-family: 'Jost', sans-serif;
      font-size: .9rem; outline: none;
    }
    .input-group input:focus { border-color: var(--navy); }
    .btn-primary {
      width: 100%; padding: 13px; background: var(--navy); color: #fff;
      border: none; border-radius: 8px; font-family: 'Jost', sans-serif;
      font-size: .88rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; cursor: pointer;
    }
    .btn-primary:hover { opacity: .9; }
    .erro-login { color: var(--red); font-size: .82rem; margin-top: 10px; display: none; }

    /* PAINEL */
    .painel { max-width: 1100px; margin: 0 auto; display: none; }
    .painel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .painel-header h1 { font-size: 1.4rem; color: var(--navy); }
    .filtros { display: flex; gap: 8px; }
    .filtro-btn {
      padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 20px;
      background: #fff; font-family: 'Jost', sans-serif; font-size: .78rem;
      font-weight: 500; cursor: pointer; color: var(--muted); transition: all .2s;
    }
    .filtro-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    .sair-btn {
      padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 20px;
      background: #fff; font-family: 'Jost', sans-serif; font-size: .78rem;
      cursor: pointer; color: var(--muted);
    }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .stat-card { background: #fff; border-radius: var(--radius); padding: 16px 20px; border-left: 4px solid var(--border); }
    .stat-card.pendente { border-color: var(--gold); }
    .stat-card.aprovado { border-color: var(--green); }
    .stat-card.rejeitado { border-color: var(--red); }
    .stat-card .num { font-size: 1.8rem; font-weight: 600; color: var(--navy); }
    .stat-card .lbl { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

    /* BARRA DE AÇÃO EM LOTE */
    .bulk-bar {
      display: none; align-items: center; justify-content: space-between;
      background: var(--navy); color: #fff; border-radius: var(--radius);
      padding: 12px 20px; margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .bulk-bar.show { display: flex; }
    .bulk-bar .info { font-size: .85rem; }
    .bulk-bar .info strong { font-size: 1rem; }
    .bulk-actions { display: flex; gap: 8px; }
    .bulk-btn {
      padding: 8px 16px; border: none; border-radius: 6px;
      font-family: 'Jost', sans-serif; font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .bulk-btn.aprovar  { background: var(--green); color: #fff; }
    .bulk-btn.rejeitar { background: var(--red); color: #fff; }
    .bulk-btn.limpar   { background: rgba(255,255,255,.15); color: #fff; }
    .bulk-btn:hover { opacity: .85; }
    .bulk-btn:disabled { opacity: .4; cursor: default; }

    .select-all-row {
      display: flex; align-items: center; gap: 10px; padding: 8px 4px;
      font-size: .8rem; color: var(--muted);
    }
    .select-all-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

    .lista { display: flex; flex-direction: column; gap: 10px; }
    .cert-card {
      background: #fff; border-radius: var(--radius); padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(13,31,60,.06);
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      transition: box-shadow .2s;
    }
    .cert-card.selected { box-shadow: 0 0 0 2px var(--navy); }

    .cert-checkbox { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }

    .cert-status { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cert-status.pendente  { background: var(--gold); }
    .cert-status.aprovado  { background: var(--green); }
    .cert-status.rejeitado { background: var(--red); }

    .cert-info { flex: 1; min-width: 200px; }
    .cert-info .nome { font-size: .95rem; font-weight: 600; color: var(--navy); }
    .cert-info .detalhe { font-size: .78rem; color: var(--muted); margin-top: 3px; }
    .cert-info .codigo { font-size: .72rem; color: var(--muted); margin-top: 4px; font-family: monospace; }

    .badge {
      padding: 4px 10px; border-radius: 20px; font-size: .72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .badge.pendente  { background: #fef3cd; color: #856404; }
    .badge.aprovado  { background: #d1e7dd; color: #0f5132; }
    .badge.rejeitado { background: #f8d7da; color: #842029; }

    .acoes { display: flex; gap: 8px; }
    .btn-aprovar, .btn-rejeitar {
      padding: 8px 16px; border: none; border-radius: 6px;
      font-family: 'Jost', sans-serif; font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-aprovar  { background: var(--green); color: #fff; }
    .btn-rejeitar { background: var(--red);   color: #fff; }
    .btn-aprovar:hover, .btn-rejeitar:hover { opacity: .85; }
    .btn-aprovar:disabled, .btn-rejeitar:disabled { opacity: .4; cursor: default; }

    .vazio { text-align: center; padding: 48px; color: var(--muted); font-size: .9rem; }
    .loading-msg { text-align: center; padding: 32px; color: var(--muted); }

    .spinner-inline {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr; }
      .cert-card { flex-direction: column; align-items: flex-start; }
      .bulk-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <h1>Painel Administrativo</h1>
  <p>Secretaria Municipal de Educação — Vacaria/RS</p>
  <div class="input-group">
    <label>Senha de acesso</label>
    <input type="password" id="senha-input" placeholder="Digite a senha" onkeydown="if(event.key==='Enter') entrar()">
  </div>
  <button class="btn-primary" onclick="entrar()">Entrar</button>
  <p class="erro-login" id="erro-login">Senha incorreta. Tente novamente.</p>
</div>

<!-- PAINEL -->
<div class="painel" id="painel">
  <div class="painel-header">
    <h1>Certificados Gerados</h1>
    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
      <div class="filtros">
        <button class="filtro-btn active" onclick="setFiltro('pendentes', this)">Pendentes</button>
        <button class="filtro-btn" onclick="setFiltro('todos', this)">Todos</button>
      </div>
      <button class="sair-btn" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card pendente">
      <div class="num" id="stat-pendente">—</div>
      <div class="lbl">Pendentes</div>
    </div>
    <div class="stat-card aprovado">
      <div class="num" id="stat-aprovado">—</div>
      <div class="lbl">Aprovados</div>
    </div>
    <div class="stat-card rejeitado">
      <div class="num" id="stat-rejeitado">—</div>
      <div class="lbl">Rejeitados</div>
    </div>
  </div>

  <!-- Barra de ação em lote — aparece quando há seleção -->
  <div class="bulk-bar" id="bulk-bar">
    <div class="info"><strong id="bulk-count">0</strong> selecionado(s)</div>
    <div class="bulk-actions">
      <button class="bulk-btn aprovar"  id="bulk-aprovar"  onclick="acaoLote('aprovar')">✓ Aprovar selecionados</button>
      <button class="bulk-btn rejeitar" id="bulk-rejeitar" onclick="acaoLote('rejeitar')">✕ Rejeitar selecionados</button>
      <button class="bulk-btn limpar" onclick="limparSelecao()">Limpar seleção</button>
    </div>
  </div>

  <div class="select-all-row" id="select-all-row" style="display:none;">
    <input type="checkbox" id="select-all" onchange="toggleSelectAll(this)">
    <label for="select-all">Selecionar todos os pendentes desta lista</label>
  </div>

  <div class="lista" id="lista">
    <div class="loading-msg">Carregando...</div>
  </div>
</div>

<script>
  let senhaAtual = '';
  let filtroAtual = 'pendentes';
  let listaAtual = [];
  let selecionados = new Set();

  function entrar() {
    const senha = document.getElementById('senha-input').value;
    if (!senha) return;
    senhaAtual = senha;
    carregarLista();
  }

  function sair() {
    senhaAtual = '';
    selecionados.clear();
    document.getElementById('senha-input').value = '';
    document.getElementById('login-wrap').style.display = 'block';
    document.getElementById('painel').style.display = 'none';
    document.getElementById('erro-login').style.display = 'none';
  }

  function setFiltro(filtro, btn) {
    filtroAtual = filtro;
    selecionados.clear();
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    carregarLista();
  }

  async function carregarLista() {
    try {
      const res = await fetch(`/api/admin/certificado?senha=${encodeURIComponent(senhaAtual)}&filtro=${filtroAtual}`);

      if (res.status === 401) {
        document.getElementById('erro-login').style.display = 'block';
        return;
      }

      document.getElementById('erro-login').style.display = 'none';
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('painel').style.display = 'block';

      listaAtual = await res.json();
      renderLista(listaAtual);
      atualizarStats(listaAtual);
      atualizarBulkBar();

    } catch (err) {
      document.getElementById('lista').innerHTML = `<div class="vazio">Erro ao carregar: ${err.message}</div>`;
    }
  }

  function atualizarStats(lista) {
    document.getElementById('stat-pendente').textContent  = lista.filter(c => c.status === 'pendente').length;
    document.getElementById('stat-aprovado').textContent  = lista.filter(c => c.status === 'aprovado').length;
    document.getElementById('stat-rejeitado').textContent = lista.filter(c => c.status === 'rejeitado').length;
  }

  function renderLista(lista) {
    const el = document.getElementById('lista');
    const selectAllRow = document.getElementById('select-all-row');

    const pendentesNaLista = lista.filter(c => c.status === 'pendente');
    selectAllRow.style.display = pendentesNaLista.length > 0 ? 'flex' : 'none';

    if (lista.length === 0) {
      el.innerHTML = '<div class="vazio">Nenhum certificado encontrado.</div>';
      return;
    }

    el.innerHTML = lista.map(cert => {
      const isPendente = cert.status === 'pendente';
      const isSelected = selecionados.has(cert.codigo);
      const tipo = cert.tipo === 'anual' ? 'Anual' : 'Individual';
      const detalhe = cert.tipo === 'individual'
        ? `${cert.curso || '—'} · ${cert.cargaHoraria || '?'}h · ${cert.dataEmissao || ''}`
        : `${cert.periodoTexto || '—'} · ${cert.dataEmissao || ''}`;
      const criadoEm = cert.criadoEm ? new Date(cert.criadoEm).toLocaleString('pt-BR') : '';

      return `
        <div class="cert-card ${isSelected ? 'selected' : ''}" id="card-${cert.codigo}">
          ${isPendente ? `
            <input type="checkbox" class="cert-checkbox" ${isSelected ? 'checked' : ''}
                   onchange="toggleSelecionado('${cert.codigo}', this)">
          ` : `<div style="width:18px"></div>`}
          <div class="cert-status ${cert.status}"></div>
          <div class="cert-info">
            <div class="nome">${cert.nome || '—'} <span style="font-weight:400;color:var(--muted);font-size:.8rem;">(${tipo})</span></div>
            <div class="detalhe">${detalhe}</div>
            <div class="detalhe">${cert.cargo || ''} ${cert.matricula ? '· Mat: ' + cert.matricula : ''}</div>
            <div class="codigo">Código: ${cert.codigo} · Gerado em: ${criadoEm}</div>
          </div>
          <span class="badge ${cert.status}">${cert.status}</span>
          ${isPendente ? `
          <div class="acoes">
            <button class="btn-aprovar"  onclick="acao('${cert.codigo}', 'aprovar')">✓ Aprovar</button>
            <button class="btn-rejeitar" onclick="acao('${cert.codigo}', 'rejeitar')">✕ Rejeitar</button>
          </div>` : ''}
        </div>
      `;
    }).join('');
  }

  function toggleSelecionado(codigo, checkbox) {
    if (checkbox.checked) selecionados.add(codigo);
    else selecionados.delete(codigo);
    document.getElementById(`card-${codigo}`).classList.toggle('selected', checkbox.checked);
    atualizarBulkBar();
  }

  function toggleSelectAll(checkbox) {
    const pendentes = listaAtual.filter(c => c.status === 'pendente');
    if (checkbox.checked) {
      pendentes.forEach(c => selecionados.add(c.codigo));
    } else {
      pendentes.forEach(c => selecionados.delete(c.codigo));
    }
    renderLista(listaAtual);
    atualizarBulkBar();
  }

  function limparSelecao() {
    selecionados.clear();
    document.getElementById('select-all').checked = false;
    renderLista(listaAtual);
    atualizarBulkBar();
  }

  function atualizarBulkBar() {
    const bar = document.getElementById('bulk-bar');
    const count = selecionados.size;
    document.getElementById('bulk-count').textContent = count;
    bar.classList.toggle('show', count > 0);
  }

  async function acao(codigo, tipo) {
    const card       = document.getElementById(`card-${codigo}`);
    const btnAprova  = card.querySelector('.btn-aprovar');
    const btnRejeita = card.querySelector('.btn-rejeitar');

    if (btnAprova)  { btnAprova.disabled  = true; btnAprova.innerHTML = '<span class="spinner-inline"></span>'; }
    if (btnRejeita) { btnRejeita.disabled = true; }

    try {
      const res = await fetch('/api/admin/certificado', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ senha: senhaAtual, codigo, acao: tipo }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro desconhecido');

      selecionados.delete(codigo);
      carregarLista();

    } catch (err) {
      if (btnAprova)  { btnAprova.disabled  = false; btnAprova.textContent  = '✓ Aprovar'; }
      if (btnRejeita) { btnRejeita.disabled = false; }
      alert(`Erro: ${err.message}`);
    }
  }

  async function acaoLote(tipo) {
    if (selecionados.size === 0) return;

    const codigos = Array.from(selecionados);
    const confirmText = tipo === 'aprovar'
      ? `Aprovar ${codigos.length} certificado(s)?`
      : `Rejeitar ${codigos.length} certificado(s)?`;
    if (!confirm(confirmText)) return;

    const btnAprovar  = document.getElementById('bulk-aprovar');
    const btnRejeitar = document.getElementById('bulk-rejeitar');
    btnAprovar.disabled  = true;
    btnRejeitar.disabled = true;
    const btnAlvo = tipo === 'aprovar' ? btnAprovar : btnRejeitar;
    const textoOriginal = btnAlvo.textContent;
    btnAlvo.innerHTML = '<span class="spinner-inline"></span> Processando...';

    try {
      const res = await fetch('/api/admin/certificado', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ senha: senhaAtual, codigos, acao: tipo }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro desconhecido');

      selecionados.clear();
      alert(`✓ ${data.processados} certificado(s) atualizados com sucesso!` +
            (data.falhas > 0 ? `\n⚠ ${data.falhas} falha(s).` : ''));
      carregarLista();

    } catch (err) {
      alert(`Erro: ${err.message}`);
    } finally {
      btnAprovar.disabled  = false;
      btnRejeitar.disabled = false;
      btnAlvo.textContent = textoOriginal;
    }
  }

  document.getElementById('senha-input').focus();
</script>
</body>
</html>
